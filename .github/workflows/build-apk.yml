name: Build A-Dex APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x A-Dex/android-app/gradlew

    - name: Build with Gradle
      run: cd A-Dex/android-app && ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: A-Dex-Live-APK
        path: A-Dex/android-app/app/build/outputs/apk/release/*.apk
